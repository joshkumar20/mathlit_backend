# ─────────────────────────────────────────────
# MathLit Backend — application.properties
# Safe to commit. Secrets come from environment
# variables or external config file at deploy.
# ─────────────────────────────────────────────

# Database (override via env vars on server)
spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:mathlit_db}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:changeme}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false

# Server
server.port=${PORT:8080}

# Firebase
firebase.service-account-path=${FIREBASE_KEY_PATH:serviceAccountKey.json}

# Scheduling
spring.task.scheduling.enabled=true

# Logging
logging.config=classpath:logback-spring.xml

# Admin panel credentials (set ADMIN_USERNAME / ADMIN_PASSWORD env vars in Railway)
admin.username=${ADMIN_USERNAME:admin}
admin.password=${ADMIN_PASSWORD:mathlit@2024}

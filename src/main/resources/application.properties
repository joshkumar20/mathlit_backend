# ─────────────────────────────────────────────
# MathLit Backend — application.properties
# Safe to commit. Secrets come from environment
# variables or external config file at deploy.
# ─────────────────────────────────────────────

# Database (override via env vars on server)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/mathlit_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:changeme}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false

# Server
server.port=${PORT:8080}

# Firebase
firebase.service-account-path=${FIREBASE_KEY_PATH:serviceAccountKey.json}

# Scheduling
spring.task.scheduling.enabled=true

# Logging
logging.config=classpath:logback-spring.xml

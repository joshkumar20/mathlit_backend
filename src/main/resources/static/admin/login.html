<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MathLit Admin — Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="login-wrap">
  <div class="login-card card">
    <div class="logo">
      <h1>Math<em>Lit</em></h1>
      <p>Admin Panel</p>
    </div>

    <div id="alert" class="alert"></div>

    <form id="loginForm">
      <div class="form-group" style="margin-bottom:14px">
        <label>Username</label>
        <input id="username" type="text" placeholder="admin" autocomplete="username" />
      </div>
      <div class="form-group" style="margin-bottom:20px">
        <label>Password</label>
        <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" />
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%">Login</button>
    </form>
  </div>
</div>

<script>
  // If already logged in, redirect
  if (localStorage.getItem('admin_token')) {
    window.location.href = 'questions.html';
  }

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const alert = document.getElementById('alert');
    const btn = e.target.querySelector('button');
    btn.textContent = 'Logging in…';
    btn.disabled = true;

    try {
      const res = await fetch('/admin/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('username').value,
          password: document.getElementById('password').value
        })
      });
      const data = await res.json();
      if (res.ok) {
        localStorage.setItem('admin_token', data.token);
        window.location.href = 'questions.html';
      } else {
        alert.className = 'alert error';
        alert.textContent = data.error || 'Login failed';
      }
    } catch (err) {
      alert.className = 'alert error';
      alert.textContent = 'Network error — is the server running?';
    } finally {
      btn.textContent = 'Login';
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
